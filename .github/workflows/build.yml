name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. v1.7.0). Leave empty to skip release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build web + electron
        run: npm run build

      - name: Package Windows installer (no auto-publish)
        run: npx electron-builder --win --x64 --publish never

      - name: Generate latest.yml for auto-updater (v1.6.x users)
        shell: pwsh
        run: |
          $exePath = (Get-Item 'release\StreamStudio-Setup-*.exe').FullName
          $exeName = [System.IO.Path]::GetFileName($exePath)
          $bytes   = [System.IO.File]::ReadAllBytes($exePath)
          $hash    = [System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes)
          $sha512  = [Convert]::ToBase64String($hash)
          $size    = (Get-Item $exePath).Length
          $refName = '${{ inputs.release_tag || github.ref_name }}'
          $ver     = $refName.TrimStart('v')
          $date    = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ss.fffZ')
          $lines = @(
            "version: $ver",
            "files:",
            "  - url: $exeName",
            "    sha512: $sha512",
            "    size: $size",
            "path: $exeName",
            "sha512: $sha512",
            "releaseDate: '$date'"
          )
          $lines -join "`n" | Set-Content -Path 'release\latest.yml' -Encoding UTF8
          Write-Host "=== Generated release/latest.yml ==="
          Get-Content 'release\latest.yml'

      - name: Upload artifact (non-release builds)
        if: "!startsWith(github.ref, 'refs/tags/') && inputs.release_tag == ''"
        uses: actions/upload-artifact@v4
        with:
          name: stream-studio-windows-${{ github.run_number }}
          path: |
            release/*.exe
            release/latest.yml
          retention-days: 30

      - name: Create GitHub Release
        if: "startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: Stream Studio ${{ inputs.release_tag || github.ref_name }}
          body: |
            ## Stream Studio ${{ inputs.release_tag || github.ref_name }}

            Real-time AI webcam transformation powered by Decart Lucy 2.1.

            ### What's new in v1.7.0
            - **In-app updates** - updates download silently inside the app with a progress bar
            - **Auto-update from v1.6.x** - users on v1.6.x are auto-updated on next launch via latest.yml
            - **Auto-update from v1.4.x** - old open-browser update calls are intercepted and handled in-app
            - **Fixed streaming** - resolved SDK v0.1.9 API changes that caused Stream Failed errors
            - **Removed electron-updater** - replaced with native Node.js downloader

            ### Installation
            1. Download StreamStudio-Setup-1.7.0.exe below
            2. Run the installer and choose your install location
            3. Launch Stream Studio from your desktop or Start Menu
            4. Enter your Decart API key and start streaming

            ### Auto-update
            - v1.7.0+ - future updates appear automatically in-app within 5 seconds of launch
            - v1.6.x - auto-detected by existing in-app updater on next launch via latest.yml
            - v1.4.x - download and run this installer once; all future updates are in-app
          files: |
            release/*.exe
            release/latest.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
