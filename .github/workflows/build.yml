name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build & package
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: stream-studio-windows-${{ github.run_number }}
          path: release/*.exe
          retention-days: 30

      - name: Create GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Stream Studio ${{ github.ref_name }}
          body: |
            ## Stream Studio ${{ github.ref_name }}

            Real-time AI webcam transformation powered by Decart Lucy 2.1.

            ### Installation
            1. Download `StreamStudio-Setup-*.exe` below
            2. Run the installer — it installs per-user, no admin required
            3. Launch **Stream Studio** from your desktop or Start Menu
            4. Enter your [Decart API key](https://app.decart.ai) and start streaming

            ### What's included
            - Full offline desktop app (no browser needed)
            - 9 AI transformation style presets
            - Audio sync pipeline for OBS streaming
            - OBS mode with clean output window
            - Fullscreen & popout support
            - Reference image upload
          files: release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
