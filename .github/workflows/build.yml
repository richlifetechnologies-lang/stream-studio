name: Build & Release

  on:
    push:
      branches: [main]
      tags: ["v*"]
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    build-windows:
      name: Build Windows Installer
      runs-on: windows-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install dependencies
          run: npm install

        - name: Build & package
          run: npm run dist:win
          env:
            ELECTRON_BUILDER_PUBLISH: never

        - name: Upload artifact (non-tag builds)
          if: "!startsWith(github.ref, 'refs/tags/')"
          uses: actions/upload-artifact@v4
          with:
            name: stream-studio-windows-${{ github.run_number }}
            path: release/*.exe
            retention-days: 30

        - name: Create GitHub Release (tag builds)
          if: startsWith(github.ref, 'refs/tags/')
          uses: softprops/action-gh-release@v2
          with:
            name: Stream Studio ${{ github.ref_name }}
            body: |
              ## Stream Studio ${{ github.ref_name }}

              Real-time AI webcam transformation powered by Decart Lucy 2.1.

              ### What's new in ${{ github.ref_name }}
              - **In-app updates** — updates download silently inside the app with a progress bar; no browser redirects
              - **Auto-update from v1.4.0+** — old installs using the "open browser" update flow are now intercepted and handled in-app
              - **Fixed streaming** — resolved SDK v0.1.9 API changes causing "Stream Failed" errors on launch
              - **Cleaner startup** — removed electron-updater; native Node.js downloader uses zero extra packages

              ### Installation
              1. Download `StreamStudio-Setup-*.exe` below
              2. Run the installer — choose your install location
              3. Launch **Stream Studio** from your desktop or Start Menu
              4. Enter your [Decart API key](https://app.decart.ai) and start streaming

              ### Upgrading from an older version
              - **v1.6.x users** — the in-app update banner appears automatically within 5 s of launch; click **Download** then **Install & Restart**
              - **v1.4.x users** — download and run this installer manually once; future updates are handled in-app

            files: release/*.exe
            token: ${{ secrets.GITHUB_TOKEN }}
            draft: false
            prerelease: false
            fail_on_unmatched_files: false
  